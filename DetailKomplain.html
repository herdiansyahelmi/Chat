<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Komplain - Alfamind</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { background: #1a1a2e; height: 100%; }
        
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            max-width: 420px;
            margin: 0 auto;
            height: 100vh;
            box-shadow: 0 0 40px rgba(0,0,0,.3);
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            background: #fff;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: bold;
            color: #333;
        }

        .header {
            background: #fff;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #eee;
        }

        .back {
            color: #e30613;
            font-size: 24px;
            text-decoration: none;
            font-weight: bold;
        }

        .header-info {
            flex: 1;
        }

        .header-info h1 {
            font-size: 14px;
            font-weight: 600;
            color: #e30613;
        }

        .header-info p {
            font-size: 11px;
            color: #666;
        }

        .ticket-info {
            background: #fff;
            padding: 16px;
            border-bottom: 1px solid #eee;
        }

        .info-row {
            margin-bottom: 12px;
        }

        .info-label {
            font-size: 11px;
            color: #999;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 13px;
            color: #333;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-open { background: #fff3cd; color: #856404; }
        .status-in_progress { background: #cce5ff; color: #004085; }
        .status-resolved { background: #d4edda; color: #155724; }
        .status-closed { background: #e2e3e5; color: #383d41; }

        .chat-container {
            flex: 1;
            background: #f5f5f5;
            overflow-y: auto;
            padding: 16px;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            gap: 8px;
        }

        .message.customer {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e30613;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .message.admin .message-avatar {
            background: #28a745;
        }

        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.4;
        }

        .message.customer .message-bubble {
            background: #e30613;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.admin .message-bubble {
            background: #fff;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
        }

        .message.customer .message-time {
            color: rgba(255,255,255,0.7);
        }

        .input-area {
            background: #fff;
            padding: 12px 16px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 8px;
        }

        #messageInput {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 13px;
            outline: none;
        }

        .btn-send {
            background: #e30613;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-send:disabled {
            background: #ccc;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
    </style>
</head>
<body>
<div class="status-bar"><span id="clock">15:33</span><div>📶 🔋 58%</div></div>

<div class="header">
    <a href="DaftarKomplain.html" class="back">‹</a>
    <div class="header-info">
        <h1 id="ticketNumber">Loading...</h1>
        <p id="ticketStatus"></p>
    </div>
</div>

<div class="ticket-info">
    <div class="info-row">
        <div class="info-label">Kategori</div>
        <div class="info-value" id="ticketCategory"></div>
    </div>
    <div class="info-row">
        <div class="info-label">Subjek</div>
        <div class="info-value" id="ticketSubject"></div>
    </div>
    <div class="info-row">
        <div class="info-label">Deskripsi</div>
        <div class="info-value" id="ticketDescription"></div>
    </div>
</div>

<div class="chat-container" id="chatMessages">
    <div class="empty-state">Memuat pesan...</div>
</div>

<div class="input-area">
    <input type="text" id="messageInput" placeholder="Ketik pesan...">
    <button class="btn-send" id="sendBtn" onclick="sendMessage()">Kirim</button>
</div>

<script>
function updateClock(){var d=new Date();document.getElementById('clock').textContent=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
updateClock();setInterval(updateClock,1000);

var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const noTlp = localStorage.getItem('noTlp');
const userName = localStorage.getItem('userName');

if (!noTlp || !userName) {
    alert('Silakan login terlebih dahulu');
    window.location.href = 'Login.html';
}

const userData = {
    noTlp: noTlp,
    nama: userName
};

const urlParams = new URLSearchParams(window.location.search);
const ticketId = urlParams.get('id');
let currentTicket = null;

async function loadTicketDetail() {
    const { data, error } = await supabase
        .from('complaint_tickets')
        .select('*')
        .eq('id', ticketId)
        .single();

    console.log('Ticket:', data, error);

    if (error || !data) {
        alert('Ticket tidak ditemukan');
        window.location.href = 'DaftarKomplain.html';
        return;
    }

    currentTicket = data;
    
    document.getElementById('ticketNumber').textContent = data.ticket_number;
    document.getElementById('ticketStatus').textContent = data.status;
    document.getElementById('ticketCategory').textContent = data.category;
    document.getElementById('ticketSubject').textContent = data.subject;
    document.getElementById('ticketDescription').textContent = data.description;
    
    // Disable input if ticket is closed
    if (data.status === 'closed') {
        document.getElementById('messageInput').disabled = true;
        document.getElementById('messageInput').placeholder = 'Ticket sudah ditutup';
        document.getElementById('sendBtn').disabled = true;
    }
    
    loadMessages();
}

async function loadMessages() {
    const { data, error } = await supabase
        .from('ticket_messages')
        .select('*')
        .eq('ticket_id', ticketId)
        .order('created_at', { ascending: true });

    console.log('Messages:', data, error);

    const container = document.getElementById('chatMessages');
    container.innerHTML = '';

    if (data && data.length > 0) {
        data.forEach(msg => {
            appendMessage(msg);
        });
    } else {
        container.innerHTML = '<div class="empty-state">Belum ada pesan</div>';
    }

    // Subscribe to new messages
    supabase
        .channel(`ticket-${ticketId}`)
        .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'ticket_messages',
            filter: `ticket_id=eq.${ticketId}`
        }, (payload) => {
            if (container.querySelector('.empty-state')) {
                container.innerHTML = '';
            }
            appendMessage(payload.new);
        })
        .subscribe();
}

function appendMessage(msg) {
    const container = document.getElementById('chatMessages');
    const isCustomer = msg.sender_type === 'customer';
    
    const div = document.createElement('div');
    div.className = `message ${msg.sender_type}`;
    
    const avatar = isCustomer ? userData.nama.charAt(0).toUpperCase() : 'A';
    const time = new Date(msg.created_at).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    
    div.innerHTML = `
        <div class="message-avatar">${avatar}</div>
        <div>
            <div class="message-bubble">${msg.message}</div>
            <div class="message-time">${time}</div>
        </div>
    `;
    
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById('messageInput');
    const message = input.value.trim();

    if (!message) return;
    
    // Check if ticket is closed
    if (currentTicket.status === 'closed') {
        alert('Ticket sudah ditutup. Tidak bisa mengirim pesan.');
        return;
    }

    document.getElementById('sendBtn').disabled = true;

    try {
        const { error } = await supabase
            .from('ticket_messages')
            .insert({
                ticket_id: ticketId,
                sender_id: userData.noTlp,
                sender_type: 'customer',
                sender_name: userData.nama,
                message: message
            });

        if (error) throw error;

        input.value = '';

    } catch (error) {
        console.error('Error:', error);
        alert('Gagal mengirim pesan');
    }

    document.getElementById('sendBtn').disabled = false;
}

document.getElementById('messageInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        sendMessage();
    }
});

loadTicketDetail();
</script>
</body>
</html>
